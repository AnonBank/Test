<div class="header-action">
  <div class="row-form">
    <label class="label-title" style="margin-right: 10px">ชื่อ-สกุล</label>

    <input nz-input class="input-box" [(ngModel)]="data.user_name" />
  </div>
</div>

<div *ngFor="let q of questions" class="question-box" style="margin-top: 20px">
  <div class="question-header">
    <nz-form-item>
      <label class="field-label">
        {{ q.question_no }} {{ q.question_text }}
      </label>
    </nz-form-item>
  </div>

  <nz-radio-group [(ngModel)]="q.selectedAnswer">
    <label nz-radio [nzValue]="1">
      {{ q.answer1 }}
    </label>

    <br />

    <label nz-radio [nzValue]="2">
      {{ q.answer2 }}
    </label>

    <br />

    <label nz-radio [nzValue]="3">
      {{ q.answer3 }}
    </label>

    <br />

    <label nz-radio [nzValue]="4">
      {{ q.answer4 }}
    </label>
  </nz-radio-group>
</div>

<div class="header-action">

  <button
    class="button"
    *ngIf="!isFinishExam"
    nz-button
    nzType="primary"
    (click)="saveData()"
    style="width: 120px; background: #3f7fdf; border-color: #3f7fdf"
  >
    ส่งข้อสอบ
  </button>

  <button
    *ngIf="isFinishExam"
    nz-button
    nzType="primary"
    (click)="retryExam()"
    class="button"
    style="width: 120px; background: #3f7fdf; border-color: #3f7fdf"
  >
    สอบอีกครั้ง
  </button>

  <span
    *ngIf="result"
    style="
      margin-left: 20px;
      font-size: 16px;
      font-weight: 600;
    "
  >
    {{ result.userName }}
    สอบได้คะแนน
    {{ result.totalCorrect }}/{{ questions.length }}
    ข้อ
  </span>

</div>
