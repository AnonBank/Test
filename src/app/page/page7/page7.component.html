<header class="page-header">
  <div class="row-form">
    <label class="label-title" style="margin-right: 10px">รหัสสินค้า</label>

    <input
      nz-input
      class="input-box"
      [(ngModel)]="barCodeData.code"
      (ngModelChange)="formatInput()"
      maxlength="35"
    />

    <button
      nz-button
      nzType="primary"
      (click)="add()"
      style="margin-left: 10px"
    >
      Add
    </button>
  </div>
</header>

<br />

<nz-table #basicTable [nzData]="listData">
  <thead>
    <tr>
      <th>Id</th>
      <th>รหัสสินค้า</th>
      <th nzWidth="100px">QR</th>
      <th nzWidth="100px">Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let item of basicTable.data; let i = index">
      <td>{{ i + 1 }}</td>
      <td>{{ item.barcode_id }}</td>

      <td>
        <button nz-button nzType="primary" style="width: 120px; background: #52c41a; border-color: #52c41a" (click)="showQR(item)">QR</button>
      </td>

      <td>
        <button nz-button nzType="primary" style="width: 120px; background: #e70e06; border-color: #e70e06" (click)="delete(item)">ลบ</button>
      </td>
    </tr>
  </tbody>
</nz-table>

<div *ngIf="isVisible" class="qr-container">
  <nz-card style="width: 320px">
    <div style="text-align: center">
      <img
        *ngIf="qrImage"
        [src]="qrImage"
        width="200"
      />
    </div>
    <button
      nz-button
      nzType="primary"
      nzDanger
      (click)="handleCancel()"
      style="margin-top: 15px; margin-left: 210px;"
    >
      Close
    </button>
  </nz-card>
</div>
